name: smart_cabinet
description: Smart Cabinet Item Finder with IoT Integration
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"  # ⬆️ Updated for new Firebase versions

dependencies:
  flutter:
    sdk: flutter

  # ======================
  # Localization
  # ======================
  flutter_localizations:
    sdk: flutter

  # ======================
  # Firebase (✅ YOUR VERSIONS - WORKING)
  # ======================
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_messaging: ^16.4.0

  # ======================
  # Google Sign-In
  # ======================
  google_sign_in: ^6.2.1

  # ======================
  # UI
  # ======================
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  intl: ^0.20.0  # ✅ Fixed
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  badges: ^3.1.2
  flutter_svg: ^2.0.10+1
  flutter_slidable: ^4.0.0
  flutter_staggered_grid_view: ^0.7.0

  # ======================
  # Forms
  # ======================
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.0.0

  # ======================
  # Image & Files
  # ======================
  image_picker: ^1.1.2
  file_picker: ^8.1.2  # ✅ Fixed - stable version
  cached_network_image: ^3.4.1
  path_provider: ^2.1.4

  # ======================
  # Connectivity
  # ======================
  connectivity_plus: ^6.0.5
  permission_handler: ^11.3.1  # ✅ Fixed

  # ======================
  # Notifications
  # ======================
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0

  # ======================
  # QR Scanner
  # ======================
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1

  # ======================
  # Sharing
  # ======================
  share_plus: ^10.1.4
  url_launcher: ^6.3.2

  # ======================
  # Security
  # ======================
  local_auth: ^3.0.1

  # ======================
  # PDF & CSV Export
  # ======================
  pdf: ^3.11.1
  printing: ^5.13.4
  csv: ^6.0.0

  # ======================
  # UUID
  # ======================
  uuid: ^4.5.1

  # ======================
  # MQTT
  # ======================
  mqtt_client: ^10.4.0

  # ======================
  # BLE
  # ======================
  flutter_reactive_ble: ^5.5.0
  universal_ble_fork: ^0.22.2
  flutter_ble_peripheral: ^2.1.1

  # ======================
  # Gemini AI
  # ======================
  google_generative_ai: ^0.4.7
  speech_to_text: ^7.4.0
  flutter_launcher_icons: ^0.14.4
  firebase_database: ^12.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  import_sorter: ^4.6.0
  intl_utils: ^2.8.7

# ======================
# Flutter Configuration
# ======================
flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

# ======================
# App Icons Configuration
# ======================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4ECDC4"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#4ECDC4"
    theme_color: "#4ECDC4"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"