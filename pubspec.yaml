name: smart_cabinet
description: Smart Cabinet Item Finder with IoT Integration
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ======================
  # Firebase
  # ======================
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_messaging: ^16.4.0

  # ======================
  # UI
  # ======================
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  badges: ^3.1.2
  flutter_svg: ^2.2.0
  flutter_slidable: ^4.0.3
  flutter_staggered_grid_view: ^0.7.0

  # ======================
  # Forms
  # ======================
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.3.0

  # ======================
  # Image & Files
  # ======================
  image_picker: ^1.1.2
  file_picker: ^12.0.0-beta.7
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5

  # ======================
  # Connectivity
  # ======================
  connectivity_plus: ^7.1.1
  permission_handler: ^12.0.1

  # ======================
  # Notifications
  # ======================
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0

  # ======================
  # QR Scanner
  # ======================
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # ======================
  # Sharing
  # ======================
  share_plus: ^13.1.0
  url_launcher: ^6.3.2

  # ======================
  # Security
  # ======================
  local_auth: ^3.0.1

  # ======================
  # PDF & CSV Export
  # ======================
  pdf: ^3.11.3
  printing: ^5.14.2
  csv: ^8.0.0

  # ======================
  # UUID
  # ======================
  uuid: ^4.5.3

  # ======================
  # MQTT
  # ======================
  mqtt_client: ^10.4.0

  # ======================
  # BLE
  # ======================
  flutter_reactive_ble: ^5.5.0
  universal_ble_fork: ^0.22.2
  flutter_ble_peripheral: ^2.1.1

  # ======================
  # Gemini AI
  # ======================
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  import_sorter: ^4.6.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/